; 乱数の管・第二源泉 — ガイガーカウンター ESP32 ファーム
; ビルド/書き込み: pio run -t upload && pio device monitor
[env:esp32]
platform = espressif32
board = esp32dev            ; Freenove ESP32-WROOM-32E は generic esp32dev で可
framework = arduino
monitor_speed = 115200
build_flags =
    -DCORE_DEBUG_LEVEL=0
; HTTPClient / WiFiClientSecure / mbedtls は arduino-esp32 コアに同梱(追加lib不要)
