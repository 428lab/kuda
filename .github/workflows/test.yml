name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      # cooldown(minimum-release-age)を尊重しつつ lockfile 厳守で再現インストール
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm test
